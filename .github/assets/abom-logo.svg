<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140">
  <defs>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Shield icon with dependency tree inside -->
  <g transform="translate(20, 10)">
    <!-- Shield shape -->
    <path d="M60 8 L110 28 L110 68 Q110 100 60 120 Q10 100 10 68 L10 28 Z"
          fill="url(#shield)" opacity="0.95"/>

    <!-- Dependency tree lines inside shield -->
    <g stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round">
      <!-- Root node to children -->
      <line x1="60" y1="35" x2="40" y2="55"/>
      <line x1="60" y1="35" x2="80" y2="55"/>
      <!-- Left child to grandchild -->
      <line x1="40" y1="55" x2="35" y2="75"/>
      <line x1="40" y1="55" x2="50" y2="75"/>
      <!-- Right child to grandchild -->
      <line x1="80" y1="55" x2="75" y2="75"/>
    </g>

    <!-- Tree nodes -->
    <g fill="#ffffff">
      <circle cx="60" cy="35" r="4.5"/>
      <circle cx="40" cy="55" r="4"/>
      <circle cx="80" cy="55" r="4"/>
      <circle cx="35" cy="75" r="3.5"/>
      <circle cx="50" cy="75" r="3.5"/>
      <circle cx="75" cy="75" r="3.5"/>
    </g>

    <!-- Alert dot on one grandchild (the hidden compromised dep) -->
    <circle cx="75" cy="75" r="3.5" fill="#ef4444"/>
    <circle cx="75" cy="75" r="6" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>

    <!-- Scan line effect -->
    <line x1="15" y1="95" x2="105" y2="95" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Text -->
  <g transform="translate(145, 0)">
    <!-- abom -->
    <text x="0" y="82" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="72" font-weight="700" fill="#e2e8f0" letter-spacing="-2">
      abom
    </text>
    <!-- Subtitle -->
    <text x="3" y="112" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="18" fill="#94a3b8" font-weight="400">
      Actions Bill of Materials
    </text>
  </g>
</svg>
